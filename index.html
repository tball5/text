<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ancient Text</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #05080e;
    overflow: hidden;
    font-family: monospace;
  }

  /* Matrix rain canvas sits behind everything */
  #rain-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    display: block;
  }

  /* Editable horizontal text in top-left.
     Add more text inside the <div id="top-text"> block below.
     The semi-transparent panel + text shadow keeps it readable
     over the rain without changing its color/size. */
  #top-text {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 2;
    max-width: calc(100% - 32px);
    color: rgba(200, 220, 240, 0.85);
    font-family: monospace;
    font-size: 16px;
    line-height: 1.4;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    background: rgba(5, 8, 14, 0.75);
    border: 1px solid rgba(120, 150, 180, 0.25);
    border-radius: 4px;
    text-shadow: 0 0 6px rgba(5, 8, 14, 0.9);
    word-break: break-word;
    white-space: normal;
  }

  /* Centered image, not full screen */
  #center-image-wrap {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  #center-image {
    max-width: 55vw;
    max-height: 70vh;
    width: auto;
    height: auto;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(120, 150, 180, 0.3);
    pointer-events: auto;
  }
</style>
</head>
<body>

  <!-- Matrix rain background (paused) -->
  <canvas id="rain-canvas"></canvas>

  <!-- TOP-LEFT HORIZONTAL TEXT
       Edit / append more text directly inside this div. -->
  <div id="top-text">ENTERTEXTHEREENTERTEXTHEREENTERTEXTHEREentertexthereEthertexthere</div>

  <!-- Centered image -->
  <div id="center-image-wrap">
    <img id="center-image" src="ancienttext.jpeg" alt="Ancient text" />
  </div>

<script>
// ============ MATRIX RAIN (PAUSED) ============
(function(){
  var rc = document.getElementById('rain-canvas');
  var rctx = rc.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var fontSize = 16;
  var columns, drops;
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*+-=[]{}|;:<>?/!～！￥（）【】';

  function sizeRain() {
    rc.width  = window.innerWidth  * dpr;
    rc.height = window.innerHeight * dpr;
    rc.style.width  = window.innerWidth  + 'px';
    rc.style.height = window.innerHeight + 'px';
    rctx.setTransform(1,0,0,1,0,0);
    rctx.scale(dpr, dpr);
    columns = Math.floor(window.innerWidth / fontSize);
    drops = [];
    // Spread the static frame across the whole screen so we get
    // a full field of characters instead of one starting row.
    for (var i = 0; i < columns; i++) {
      drops[i] = Math.random() * (window.innerHeight / fontSize);
    }
    drawStaticFrame();
  }

  // Draw ONE frame, then stop. No requestAnimationFrame loop = paused.
  function drawStaticFrame() {
    // Solid background so we start clean on resize
    rctx.fillStyle = '#05080e';
    rctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    rctx.font = fontSize + 'px monospace';

    for (var i = 0; i < drops.length; i++) {
      var x = i * fontSize;
      var y = drops[i] * fontSize;

      // tail
      var tail = chars.charAt(Math.floor(Math.random() * chars.length));
      rctx.fillStyle = 'rgba(120, 150, 180, 0.45)';
      rctx.fillText(tail, x, y - fontSize);

      // head
      var text = chars.charAt(Math.floor(Math.random() * chars.length));
      rctx.fillStyle = 'rgba(200, 220, 240, 0.85)';
      rctx.fillText(text, x, y);
    }
  }

  sizeRain();
  window.addEventListener('resize', sizeRain);
})();
</script>

</body>
</html>
