<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ancient Text</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #05080e;
    font-family: monospace;
  }

  /* Make the page scrollable. Adjust this number to control
     how much you can scroll: 300vh = ~3 screens of scroll room. */
  body {
    min-height: 300vh;
  }

  /* Matrix rain canvas stays fixed in the background */
  #rain-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    display: block;
  }

  /* Editable horizontal text in top-left.
     Stays fixed in the top-left corner even when scrolling.
     Add more text inside the <div id="top-text"> block below. */
  #top-text {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 2;
    max-width: calc(100% - 32px);
    color: rgba(200, 220, 240, 0.85);
    font-family: monospace;
    font-size: 16px;
    line-height: 1.4;
    letter-spacing: 0.5px;
    word-break: break-word;
    white-space: normal;
  }

  /* Image wrapper: takes up the full first screen,
     image is anchored to its bottom edge so on load you see
     the image at the bottom of the viewport. As you scroll down,
     the image scrolls up past the (fixed) rain background. */
  #center-image-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 16px;
    box-sizing: border-box;
    pointer-events: none;
  }

  #center-image {
    max-width: 37vw;
    max-height: 47vh;
    width: auto;
    height: auto;
    opacity: 0.48;
    pointer-events: auto;
  }

  /* On narrow screens (mobile), let the image be wider since
     37vw is too small on a phone. */
  @media (max-width: 700px) {
    #center-image {
      max-width: 70vw;
      max-height: 47vh;
    }
  }
</style>
</head>
<body>

  <!-- Matrix rain background (animated, fixed) -->
  <canvas id="rain-canvas"></canvas>

  <!-- TOP-LEFT HORIZONTAL TEXT
       Edit / append more text directly inside this div. -->
  <div id="top-text">ENTERTEXTHEREENTERTEXTHEREENTERTEXTHEREentertexthereEthertexthere</div>

  <!-- Image sits at the bottom of the first screen.
       Scroll down to make it appear to move up past the rain. -->
  <div id="center-image-wrap">
    <img id="center-image" src="ancienttext.jpg" alt="Ancient text" />
  </div>

<script>
// ============ MATRIX RAIN ============
(function(){
  var rc = document.getElementById('rain-canvas');
  var rctx = rc.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var fontSize = 16;
  var columns, drops;
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*+-=[]{}|;:<>?/!～！￥（）【】';
  function sizeRain() {
    rc.width  = window.innerWidth  * dpr;
    rc.height = window.innerHeight * dpr;
    rc.style.width  = window.innerWidth  + 'px';
    rc.style.height = window.innerHeight + 'px';
    rctx.setTransform(1,0,0,1,0,0);
    rctx.scale(dpr, dpr);
    columns = Math.floor(window.innerWidth / fontSize);
    drops = [];
    for (var i = 0; i < columns; i++) drops[i] = Math.random() * -50;
  }
  sizeRain();
  window.addEventListener('resize', sizeRain);
  var lastDraw = 0;
  function drawRain(ts) {
    if (ts - lastDraw < 50) { requestAnimationFrame(drawRain); return; }
    lastDraw = ts;
    rctx.fillStyle = 'rgba(5, 8, 14, 0.10)';
    rctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    rctx.font = fontSize + 'px monospace';
    for (var i = 0; i < drops.length; i++) {
      var text = chars.charAt(Math.floor(Math.random() * chars.length));
      var x = i * fontSize;
      var y = drops[i] * fontSize;
      rctx.fillStyle = 'rgba(200, 220, 240, 0.85)';
      rctx.fillText(text, x, y);
      if (drops[i] > 1) {
        var tail = chars.charAt(Math.floor(Math.random() * chars.length));
        rctx.fillStyle = 'rgba(120, 150, 180, 0.45)';
        rctx.fillText(tail, x, y - fontSize);
      }
      if (y > window.innerHeight && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    requestAnimationFrame(drawRain);
  }
  requestAnimationFrame(drawRain);
})();
</script>

</body>
</html>
